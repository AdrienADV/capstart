name: CI - Boilerplate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: capstart-boilerplate/package-lock.json
      - run: npm ci --omit=optional
        working-directory: capstart-boilerplate

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: capstart-boilerplate/package-lock.json
      - run: npm ci --omit=optional
        working-directory: capstart-boilerplate
      - run: npm run lint
        working-directory: capstart-boilerplate
